name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore AioiAssessment02.sln

      - name: Build
        run: dotnet build AioiAssessment02.sln --configuration Release --no-restore

      - name: Run NUnit tests
        run: dotnet test tests/WebApp.Tests/WebApp.Tests.csproj --configuration Release --no-build

      - name: Build E2E tests
        run: dotnet build tests/WebApp.E2E/WebApp.E2E.csproj --configuration Release

      - name: Install Playwright browser
        run: pwsh tests/WebApp.E2E/bin/Release/net9.0/playwright.ps1 install --with-deps chromium

      - name: Start app for E2E
        run: |
          dotnet run --project src/WebApp/WebApp.csproj --configuration Release --urls http://127.0.0.1:5099 &
          sleep 8

      - name: Run Playwright smoke tests
        env:
          E2E_BASE_URL: http://127.0.0.1:5099
        run: dotnet test tests/WebApp.E2E/WebApp.E2E.csproj --configuration Release --no-build
